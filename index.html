<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Gry LukPlays</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .container { display: flex; justify-content: center; gap: 20px; padding: 50px; flex-wrap: wrap; }
        .card { width: 300px; border: 2px solid #333; border-radius: 15px; overflow: hidden; transition: 0.3s; text-decoration: none; color: #fff; }
        .card:hover { border-color: #00ffcc; transform: scale(1.05); }
        .card img { width: 100%; height: 180px; object-fit: cover; background: #222; }
        .card h3 { padding: 15px; margin: 0; background: #111; }
    </style>
</head>
<body>
    <h1>🎮 Moje Gry</h1>
    <div class="container">
        
        <a href="https://lukplays.github.io/NeonBounce/" class="card">
            <img src="https://lukplays.github.io/NeonBounce/icon.png" alt="NeonBounce">
            <h3>Neon Bounce</h3>
        </a>

        <a href="https://lukplays.github.io/GrandmasCookies/" class="card">
            <img src="https://lukplays.github.io/GrandmasCookies/icon.png" alt="GrandmasCookies">
            <h3>Grandma's Cookies</h3>
        </a>

        <a href="https://lukplays.github.io/LegoPuzzle/" class="card">
            <img src="https://lukplays.github.io/LegoPuzzle/icon.png" alt="LegoPuzzle">
            <h3>Lego Puzzle</h3>
        </a>

    </div>
</body>
</html>
