<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LukPlays - Gry</title>
    <style>
        /* Szybkie kolory i reset */
        body { 
            background: #0a0a0c; 
            color: #eee; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; 
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        header { padding: 30px 15px; text-align: center; }
        
        h1 { 
            font-size: 2rem; 
            margin: 0; 
            color: #00ffcc; 
            text-shadow: 0 0 5px rgba(0,255,204,0.3);
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: #16161a;
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            border: 1px solid #222;
            transition: transform 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        /* Lekki efekt po najechaniu (tylko na komputerach) */
        @media (hover: hover) {
            .card:hover { transform: translateY(-5px); border-color: #00ffcc; }
        }

        .card img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background: #000;
        }

        .card-info { padding: 15px; text-align: center; }
        .card-info h3 { margin: 0; font-size: 1.2rem; }
        
        .play-tag {
            display: inline-block;
            margin-top: 10px;
            font-size: 0.8rem;
            color: #00ffcc;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        footer { text-align: center; padding: 30px; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <h1>🕹️ Select a Game</h1>
    </header>

    <div class="container">
        
        <a href="https://lukplays.github.io/NeonBounce/" class="card">
            <img src="https://lukplays.github.io/NeonBounce/icon.png" alt="Neon Bounce">
            <div class="card-info">
                <h3>Neon Bounce</h3>
                <div class="play-tag">Click to play</div>
            </div>
        </a>

        <a href="https://lukplays.github.io/GrandmasCookies/" class="card">
            <img src="https://lukplays.github.io/GrandmasCookies/icon.png" alt="Grandma's Cookies">
            <div class="card-info">
                <h3>Grandma's Cookies</h3>
                <div class="play-tag">Click to play</div>
            </div>
        </a>

        <a href="https://lukplays.github.io/LegoPuzzle/" class="card">
            <img src="https://lukplays.github.io/LegoPuzzle/icon.png" alt="Lego Puzzle">
            <div class="card-info">
                <h3>Lego Puzzle</h3>
                <div class="play-tag">Click to play</div>
            </div>
        </a>

    </div>

    <footer>
        &copy; 2024 LukPlays
    </footer>

</body>
</html>
